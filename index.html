<!DOCTYPE html>
<html>
<head>
    <title>Skills Map Exam Practice Builder</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            text-align: center;
        }

        .container {
            width: 750px;
            margin: auto;
            margin-top: 50px;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }

        .row {
            display: flex;
            gap: 10px;
            width: fit-content;
            margin: 5px auto;
            align-items: center;
        }

        .row.dragging {
            background: #e8f0fe;
        }

        .header-row {
            display: flex;
            gap: 10px;
            width: fit-content;
            margin: 10px auto;
            font-weight: bold;
        }

        .header-cell {
            width: 150px;
            text-align: left;
        }

        select {
            width: 150px;
            padding: 8px;
        }

        button {
            padding: 8px 12px;
            margin: 5px;
            background: #0078d4;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #005a9e;
        }

        button:disabled {
            background: #999;
            cursor: not-allowed;
        }

        .delete-btn {
            background: #d83b01;
        }

        .delete-btn:hover {
            background: #a4262c;
        }

        .drag-handle {
            cursor: grab;
            font-size: 18px;
        }

        #loginBox {
            margin-top: 120px;
        }
    </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
    <h2>Skills Map Exam Practice Builder Login</h2>
    <input type="password" id="password" placeholder="Enter password">
    <br><br>
    <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div class="container" id="app" style="display:none;">
    <h1>Skills Map Exam Practice Builder</h1>

    <div class="header-row">
        <div></div>
        <div class="header-cell">Month</div>
        <div class="header-cell">Paper</div>
        <div class="header-cell">Question</div>
        <div></div>
    </div>

    <div id="rows">Loading...</div>

    <hr style="margin: 20px 0 25px 0; width: 100%; border: none; border-top: 1px solid #e0e0e0;">

    <div>
        <button onclick="addRow()">Add Question</button>
        <button id="generateBtn" onclick="generate()">Generate</button>
    </div>

    <div id="status" style="margin-top:10px; font-weight:bold;"></div>

    <div style="margin-top: 30px;">
        <label><input type="radio" name="type" value="word" checked> Word</label>
        <label><input type="radio" name="type" value="pdf"> PDF</label>
    </div>

<script>

let isGenerating = false;  // ✅ safeguard


function login() {
    const pw = document.getElementById("password").value;

    if (pw === "maths123") {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("app").style.display = "block";
        loadStructure();
    } else {
        alert("Incorrect password");
    }
}

let structure = {};

async function loadStructure() {
    try {
        const res = await fetch("/structure");
        structure = await res.json();

        document.getElementById("rows").innerHTML = "";

        const loaded = loadFromURL();

        if (!loaded) addRow();

    } catch (err) {
        document.getElementById("rows").innerHTML = "Failed to load data.";
    }
}


// ✅ GENERATE (UPDATED WITH SAFEGUARD)
async function generate() {

    if (isGenerating) return;  // ✅ block multiple clicks

    const btn = document.getElementById("generateBtn");
    const status = document.getElementById("status");

    isGenerating = true;
    btn.disabled = true;
    btn.innerText = "Generating...";
    status.innerText = "Building your document...";

    try {

        const rows = document.querySelectorAll("#rows .row");
        let entries = [];

        rows.forEach(row => {
            const monthYear = row.querySelector(".month").value;
            const paper = row.querySelector(".paper").value;
            const q = row.querySelector(".question").value.replace("Q","");

            const parts = monthYear.split(" ");
            const paperName = `${parts[0]} ${parts[1]} ${paper}`;

            entries.push([paperName, parseInt(q)]);
        });

        const type = document.querySelector('input[name="type"]:checked').value;

        const response = await fetch("/generate", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({entries: entries, filetype: type})
        });

        const blob = await response.blob();
        const url = URL.createObjectURL(blob);

        let filename = prompt("Enter file name:", "Skills Map Exam Practice");
        if (!filename) filename = "Skills Map Exam Practice";

        const ext = type === "word" ? ".docx" : ".pdf";

        const a = document.createElement("a");
        a.href = url;
        a.download = filename + ext;
        a.click();

        status.innerText = "✅ Download ready";

    } catch (err) {

        console.error(err);
        status.innerText = "❌ Error generating file";

    }

    btn.disabled = false;
    btn.innerText = "Generate";
    isGenerating = false;
}

</script>

</body>
</html>
